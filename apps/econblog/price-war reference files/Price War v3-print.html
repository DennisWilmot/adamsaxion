<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Price War · v3 · print</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&family=Kalam:wght@400;700&family=Gloria+Hallelujah&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="pricewar.css" />
<style>
  html, body { background: #f6f1e7; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .print-root { padding: 28px 24px 40px; max-width: none; }
  .print-cover { max-width: 1140px; margin: 0 auto 28px; }
  .print-cover .title-row { margin-top: 14px; }
  .print-toc { margin-top: 24px; background: #fffdf6; border: 1.5px solid var(--ink); border-radius: 14px; padding: 16px 20px; box-shadow: 4px 4px 0 rgba(31,28,24,.08); }
  .print-toc ol { margin: 8px 0 0; padding-left: 22px; line-height: 1.8; font-family: 'Patrick Hand', cursive; font-size: 15px; columns: 2; column-gap: 28px; }
  .print-toc ol li { break-inside: avoid; }
  .print-toc ol li b { font-family: 'Caveat', cursive; font-size: 17px; margin-right: 4px; color: var(--accent); }
  .print-toc .step-hint { display: inline; margin: 0; font-size: 12px; }

  .print-page { max-width: 1280px; margin: 0 auto; padding: 32px 0 40px; }
  .print-head { display: flex; align-items: baseline; gap: 10px; padding: 0 8px 8px; border-bottom: 1.5px dashed var(--ink-3); margin-bottom: 14px; }
  .print-head .num { font-family: 'Caveat', cursive; font-weight: 700; font-size: 28px; color: var(--accent); line-height: 1; }
  .print-head .sec { font-family: 'Patrick Hand', cursive; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-3); font-size: 12px; }
  .print-head .dot { width: 4px; height: 4px; background: var(--ink-3); border-radius: 50%; display: inline-block; }
  .print-head .lbl { font-family: 'Caveat', cursive; font-weight: 700; font-size: 22px; }
  .print-head .sub { font-family: 'Patrick Hand', cursive; color: var(--ink-3); font-size: 13px; }

  /* Frames inside print need their full width and to NOT clip absolutely-positioned tooltips. */
  .print-frame, .print-frame .wf-card { overflow: visible !important; }
  .print-frame .page, .print-frame > .crumbs, .print-frame > .title-row, .print-frame > .notes { max-width: none; padding: 0; margin: 0; }
  .print-frame h2 { font-size: 32px; }
  .print-frame .stat-num { font-family: 'Caveat', cursive; font-weight: 700; font-size: 24px; line-height: 1; }
  .print-frame .stat-label { font-family: 'Patrick Hand', cursive; color: var(--ink-3); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }

  @page { size: landscape; margin: 0.5cm; }

  @media print {
    .print-cover { page-break-after: always; break-after: page; }
    .print-page {
      page-break-before: always;
      break-before: page;
      page-break-inside: avoid;
      break-inside: avoid;
      padding: 0;
    }
    .print-page:first-of-type { page-break-before: auto; break-before: auto; }
    .frame { box-shadow: none; }
    .print-head { margin-bottom: 8px; padding-bottom: 6px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="pricewar-v2-core.jsx"></script>
<script type="text/babel" src="pricewar-v2-library.jsx"></script>
<script type="text/babel" src="pricewar-v2-decide.jsx"></script>
<script type="text/babel" src="pricewar-v3-refined-a.jsx"></script>
<script type="text/babel" src="pricewar-v3-refined-b.jsx"></script>
<script type="text/babel" src="pricewar-v3-new-prematch.jsx"></script>
<script type="text/babel" src="pricewar-v3-new-midmatch.jsx"></script>
<script type="text/babel" src="pricewar-v3-new-terminal.jsx"></script>
<script type="text/babel" src="pricewar-v3-new-meta.jsx"></script>
<script type="text/babel" src="pricewar-v3-new-onboarding.jsx"></script>
<script type="text/babel" src="pricewar-v3-print-app.jsx"></script>

<script type="text/babel">
  (async () => {
    try { if (document.fonts && document.fonts.ready) { await document.fonts.ready; } } catch (e) {}
    await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
    await new Promise((r) => setTimeout(r, 800));
    window.print();
  })();
</script>
</body>
</html>
