<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Profile · Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&family=Kalam:wght@400;700&family=Gloria+Hallelujah&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:#f7f1e3;
    --paper-2:#efe8d6;
    --ink:#1f1c18;
    --ink-2:#4a4640;
    --ink-3:#7c7770;
    --rule:#1f1c18;
    --accent:#1f59c2;
    --accent-soft:#bdd1f3;
    --warm:#c84a2c;
    --good:#3a7d44;
    --shadow:0 2px 0 rgba(31,28,24,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:'Patrick Hand', ui-monospace, monospace;font-size:16px}
  /* paper texture */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(rgba(31,28,24,.04) 1px, transparent 1px) 0 0 / 18px 18px,
      radial-gradient(rgba(31,28,24,.03) 1px, transparent 1px) 9px 9px / 18px 18px;
    mix-blend-mode:multiply;
    opacity:.6;
  }
  #app{position:relative;z-index:1}

  h1,h2,h3,h4{font-family:'Caveat', cursive;font-weight:700;margin:0;color:var(--ink)}
  h1{font-size:46px;line-height:1}
  h2{font-size:30px;line-height:1.05}
  h3{font-size:24px;line-height:1.1}
  h4{font-size:20px}
  p{margin:0}

  .page{max-width:1280px;margin:0 auto;padding:40px 28px 160px}
  .crumbs{display:flex;align-items:baseline;gap:14px;color:var(--ink-3);font-size:14px}
  .crumbs .dot{width:6px;height:6px;border-radius:50%;background:var(--ink-3);display:inline-block}

  .title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-top:6px;border-bottom:1.5px dashed var(--ink);padding-bottom:14px}
  .title-row p{max-width:560px;color:var(--ink-2);font-size:17px}

  .notes{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:20px}
  .note{
    background:#fffdf6;
    border:1.5px solid var(--ink);
    border-radius:14px;
    padding:14px 16px;
    box-shadow:var(--shadow);
    position:relative;
  }
  .note::before{
    content:"";position:absolute;top:-9px;left:18px;width:54px;height:18px;
    background:rgba(255,235,120,.85);transform:rotate(-2deg);
    box-shadow:0 1px 2px rgba(0,0,0,.1);
  }
  .note b{font-family:'Caveat',cursive;font-size:22px;font-weight:700;display:block;margin-bottom:2px}
  .note span{color:var(--ink-2);font-size:15px;line-height:1.35}

  /* Top tab switcher (which destination tab are we designing) */
  .exp-tabs{display:flex;gap:10px;margin:34px 0 18px;flex-wrap:wrap;align-items:center}
  .exp-tabs .lbl{font-family:'Caveat',cursive;font-size:22px;color:var(--ink-2);margin-right:6px}
  .exp-tab{
    appearance:none;border:1.5px solid var(--ink);background:#fffdf6;color:var(--ink);
    font-family:'Kalam',cursive;font-weight:700;font-size:16px;
    padding:8px 16px;border-radius:999px;cursor:pointer;
    box-shadow:var(--shadow);
    transition:transform .08s ease;
  }
  .exp-tab:hover{transform:translateY(-1px)}
  .exp-tab[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
  .exp-tab .ct{display:inline-block;margin-left:8px;font-family:'Patrick Hand';font-weight:400;font-size:14px;opacity:.7}

  /* The option grid */
  .options{display:flex;flex-direction:column;gap:42px;margin-top:8px}
  .option{position:relative}
  .option-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:10px;border-bottom:1.5px solid var(--ink);padding-bottom:6px}
  .option-head .tag{
    background:var(--ink);color:var(--paper);font-family:'Caveat',cursive;font-weight:700;
    padding:2px 10px;border-radius:999px;font-size:18px;letter-spacing:.02em;
  }
  .option-head h3{flex:1;min-width:0}
  .option-head .why{color:var(--ink-2);font-size:15px;max-width:50%;text-align:right}

  /* The wireframe "device" frame */
  .frame{
    background:#fffdf6;
    border:1.75px solid var(--ink);
    border-radius:18px;
    box-shadow:6px 6px 0 rgba(31,28,24,.08);
    padding:18px;
    position:relative;
  }
  .frame::after{
    content:"";position:absolute;left:14px;right:14px;top:8px;height:1px;
    background:repeating-linear-gradient(90deg, rgba(31,28,24,.12) 0 6px, transparent 6px 12px);
  }
  .frame.mobile{max-width:420px;margin:0 auto}

  /* Top chrome of the simulated profile page */
  .chrome{display:flex;flex-direction:column;gap:12px}

  /* Header treatments */
  .hdr-full{display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;padding:6px 4px 14px;border-bottom:1.5px dashed var(--ink-3)}
  .hdr-slim{display:flex;gap:14px;align-items:center;padding:4px 4px 10px;border-bottom:1.5px dashed var(--ink-3)}
  .avatar{
    width:64px;height:64px;border-radius:14px;border:1.5px solid var(--ink);
    background:
      linear-gradient(135deg, rgba(31,89,194,.18), rgba(31,89,194,.05)),
      repeating-linear-gradient(45deg, transparent 0 6px, rgba(31,28,24,.07) 6px 7px);
    display:flex;align-items:center;justify-content:center;
    font-family:'Caveat',cursive;font-size:26px;color:var(--ink-2);
    flex:none;
  }
  .avatar.sm{width:44px;height:44px;font-size:18px;border-radius:10px}
  .hdr-name{font-family:'Caveat',cursive;font-size:34px;font-weight:700;line-height:1}
  .hdr-mail{color:var(--ink-3);font-size:15px;margin-top:2px}
  .hdr-stats{display:flex;gap:18px}
  .stat-pill{
    border:1.5px solid var(--ink);border-radius:10px;padding:6px 12px;background:#fffdf6;
    text-align:left;min-width:80px;
  }
  .stat-pill b{font-family:'Caveat',cursive;font-size:26px;display:block;line-height:1;color:var(--accent)}
  .stat-pill span{font-size:12px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
  .level-bar{margin-top:6px;width:100%;align-self:stretch}
  .level-track{height:8px;border:1.5px solid var(--ink);border-radius:999px;background:#fffdf6;position:relative;overflow:hidden}
  .level-fill{position:absolute;top:0;bottom:0;left:0;width:18%;background:repeating-linear-gradient(45deg, var(--accent) 0 4px, var(--accent-soft) 4px 8px);}
  .level-row{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-3);margin-bottom:2px}

  /* Tab bars — multiple styles */
  .tabbar{padding:6px 2px 0;position:relative}
  .tab-list{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

  /* style: pill */
  .tab-list.style-pill .tab{
    border:1.5px solid var(--ink);background:#fffdf6;padding:7px 14px;border-radius:999px;
    display:inline-flex;align-items:center;gap:8px;font-family:'Kalam',cursive;font-weight:700;
    color:var(--ink);font-size:15px;box-shadow:var(--shadow);cursor:pointer;
  }
  .tab-list.style-pill .tab.active{background:var(--ink);color:var(--paper)}
  .tab-list.style-pill .tab .ico{width:16px;height:16px;border:1.5px solid currentColor;border-radius:4px;display:inline-block}
  .tab-list.style-pill .tab .count{background:var(--accent);color:#fff;font-family:'Patrick Hand';font-size:12px;padding:0 6px;border-radius:999px}

  /* style: underline */
  .tab-list.style-underline{gap:24px;border-bottom:1.5px solid var(--ink);padding-bottom:0}
  .tab-list.style-underline .tab{
    background:transparent;border:none;padding:8px 0 10px;cursor:pointer;
    font-family:'Kalam',cursive;font-weight:700;font-size:16px;color:var(--ink-3);
    border-bottom:3px solid transparent;margin-bottom:-1.5px;
    display:inline-flex;align-items:center;gap:8px;
  }
  .tab-list.style-underline .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .tab-list.style-underline .tab .ico{width:14px;height:14px;border:1.5px solid currentColor;border-radius:50%;display:inline-block}

  /* style: segmented */
  .tab-list.style-segmented{gap:0;border:1.5px solid var(--ink);border-radius:12px;padding:4px;background:var(--paper-2);width:max-content;max-width:100%}
  .tab-list.style-segmented .tab{
    background:transparent;border:none;padding:6px 14px;border-radius:9px;cursor:pointer;
    font-family:'Kalam',cursive;font-weight:700;font-size:14px;color:var(--ink-2);
  }
  .tab-list.style-segmented .tab.active{background:#fffdf6;color:var(--ink);box-shadow:0 1px 0 rgba(31,28,24,.1), inset 0 0 0 1.5px var(--ink)}

  /* style: sidebar (rendered as a flex row with side nav) */
  .has-sidebar{display:grid;grid-template-columns:200px 1fr;gap:18px}
  .has-sidebar .tab-list.style-sidebar{flex-direction:column;align-items:stretch;gap:4px;border-right:1.5px dashed var(--ink-3);padding-right:14px}
  .has-sidebar .tab-list.style-sidebar .tab{
    background:transparent;border:1.5px solid transparent;padding:9px 12px;border-radius:10px;cursor:pointer;
    font-family:'Kalam',cursive;font-weight:700;font-size:15px;color:var(--ink-2);text-align:left;
    display:flex;align-items:center;gap:10px;
  }
  .has-sidebar .tab-list.style-sidebar .tab.active{background:#fffdf6;border-color:var(--ink);color:var(--ink);box-shadow:var(--shadow)}

  /* Tab content area */
  .tab-body{padding:18px 2px 6px;display:flex;flex-direction:column;gap:14px}

  /* generic wireframe primitives */
  .wf-card{border:1.5px solid var(--ink);border-radius:14px;background:#fffdf6;padding:14px;box-shadow:var(--shadow);position:relative}
  .wf-card.dashed{border-style:dashed}
  .wf-card .eyebrow{font-family:'Patrick Hand';color:var(--ink-3);font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .wf-card h4{font-family:'Caveat',cursive;font-weight:700}
  .wf-row{display:flex;gap:12px}
  .wf-row.wrap{flex-wrap:wrap}
  .wf-col{display:flex;flex-direction:column;gap:12px;min-width:0;flex:1}
  .wf-bar{height:10px;background:repeating-linear-gradient(90deg, var(--ink-3) 0 6px, transparent 6px 12px);opacity:.45;border-radius:4px}
  .wf-bar.short{width:40%}
  .wf-bar.mid{width:65%}
  .wf-bar.tall{height:14px}
  .wf-img{
    height:120px;border:1.5px dashed var(--ink-3);border-radius:10px;
    background:repeating-linear-gradient(135deg, transparent 0 10px, rgba(31,28,24,.06) 10px 11px);
    display:flex;align-items:center;justify-content:center;color:var(--ink-3);
    font-family:ui-monospace,monospace;font-size:12px;text-transform:uppercase;letter-spacing:.06em;
  }
  .wf-btn{
    display:inline-flex;align-items:center;gap:8px;
    border:1.5px solid var(--ink);background:#fffdf6;color:var(--ink);
    padding:6px 12px;border-radius:10px;font-family:'Kalam',cursive;font-weight:700;font-size:14px;
    box-shadow:var(--shadow);cursor:pointer;
  }
  .wf-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .wf-btn.danger{color:var(--warm);border-color:var(--warm)}
  .wf-btn.ghost{background:transparent;box-shadow:none}
  .wf-kv{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px dashed var(--ink-3);gap:14px}
  .wf-kv:last-child{border-bottom:none}
  .wf-kv .k{color:var(--ink-3);text-transform:uppercase;font-size:12px;letter-spacing:.06em}
  .wf-kv .v{font-family:'Kalam',cursive;font-weight:700}
  .wf-grid{display:grid;gap:12px}
  .wf-grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .wf-grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .wf-grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}

  .annot{
    position:absolute;font-family:'Gloria Hallelujah',cursive;font-size:13px;color:var(--warm);
    line-height:1.2;max-width:180px;
  }
  .annot svg{position:absolute}

  /* Path timeline nodes */
  .path-row{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:14px 4px 4px;position:relative}
  .path-node{display:flex;flex-direction:column;align-items:center;min-width:120px;text-align:center;position:relative;padding:0 6px}
  .path-node::before{content:"";position:absolute;top:18px;left:0;right:0;height:1.5px;background:var(--ink-3);z-index:0}
  .path-node:first-child::before{left:50%}
  .path-node:last-child::before{right:50%}
  .path-node .circ{
    width:36px;height:36px;border-radius:50%;border:1.5px solid var(--ink);background:#fffdf6;
    display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-weight:700;font-size:20px;
    position:relative;z-index:1;
  }
  .path-node.done .circ{background:var(--good);color:#fff;border-color:var(--good)}
  .path-node.current .circ{background:var(--accent);color:#fff;border-color:var(--accent)}
  .path-node .lbl{font-size:13px;color:var(--ink-2);margin-top:8px;line-height:1.2;max-width:120px}
  .path-node .state{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

  /* heatmap */
  .heat{display:grid;grid-template-columns:repeat(20,1fr);gap:3px}
  .heat .c{aspect-ratio:1;border-radius:2px;background:rgba(31,28,24,.08);border:1px solid rgba(31,28,24,.08)}
  .heat .c.l1{background:rgba(31,89,194,.18)}
  .heat .c.l2{background:rgba(31,89,194,.36)}
  .heat .c.l3{background:rgba(31,89,194,.56)}
  .heat .c.l4{background:rgba(31,89,194,.85)}

  /* bar chart */
  .barchart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:6px 0;border-bottom:1.5px solid var(--ink-3)}
  .barchart .b{flex:1;background:var(--accent);opacity:.7;border-radius:3px 3px 0 0;border:1.5px solid var(--accent)}

  /* leaderboard row */
  .lb{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--ink-3)}
  .lb:last-child{border-bottom:none}
  .lb .rk{font-family:'Caveat',cursive;font-weight:700;font-size:22px;text-align:center}
  .lb.me{background:rgba(31,89,194,.06);margin:0 -8px;padding:8px;border-radius:8px;border-bottom:none}

  /* lesson list */
  .lesson{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--ink-3)}
  .lesson:last-child{border-bottom:none}
  .lesson .check{
    width:22px;height:22px;border:1.5px solid var(--ink);border-radius:6px;flex:none;
    display:flex;align-items:center;justify-content:center;font-family:'Kalam',cursive;font-weight:700;color:var(--good)
  }
  .lesson .check.done{background:var(--good);color:#fff;border-color:var(--good)}
  .lesson .ttl{flex:1;min-width:0}
  .lesson .meta{font-size:12px;color:var(--ink-3)}

  /* mobile mode: scale frame */
  .mobile-shell{display:flex;justify-content:center}

  /* density */
  .density-compact .wf-card{padding:10px}
  .density-compact .tab-body{gap:10px}
  .density-compact .wf-kv{padding:5px 0}
  .density-roomy .wf-card{padding:18px}
  .density-roomy .tab-body{gap:18px}

  /* responsive: shrink frame internals on small screens */
  @media (max-width: 720px){
    h1{font-size:34px}
    .notes{grid-template-columns:1fr}
    .frame{padding:12px}
    .hdr-stats{display:none}
    .has-sidebar{grid-template-columns:1fr}
    .has-sidebar .tab-list.style-sidebar{flex-direction:row;flex-wrap:wrap;border-right:none;padding-right:0;border-bottom:1.5px dashed var(--ink-3);padding-bottom:10px}
  }

  /* tape decoration on first option of each tab */
  .tape{position:absolute;top:-10px;right:30px;width:80px;height:22px;background:rgba(255,235,120,.7);transform:rotate(3deg);box-shadow:0 1px 2px rgba(0,0,0,.08);border:1px dashed rgba(0,0,0,.1)}

  footer{margin-top:50px;color:var(--ink-3);font-size:14px;border-top:1.5px dashed var(--ink);padding-top:14px}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframes.jsx"></script>
</body>
</html>
