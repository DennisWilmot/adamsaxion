[build]
builder = "RAILPACK"
# Dependencies are installed by Railpack's install step (pnpm + frozen lockfile).
# Do not run `pnpm install` here — pnpm is not on PATH until after that step.
buildCommand = "pnpm build"

[deploy]
startCommand = "pnpm start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
