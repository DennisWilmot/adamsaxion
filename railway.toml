# Build from the monorepo root so Railpack sees pnpm-lock.yaml, pnpm-workspace.yaml,
# and packageManager. Do NOT set Root Directory to apps/econblog in Railway settings.
[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @adamsaxion/econblog build"
watchPatterns = [
  "apps/econblog/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "package.json",
  "railpack.json",
]

[deploy]
startCommand = "pnpm --filter @adamsaxion/econblog start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
